<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRE-SCHOOL CONTACT</title>
</head>
<h1>PRE-SCHOOL CONTACT FORM</h1>
<body>
    <form action="#" method="post">                                              
        <fieldset>

            <legend>User Registration</legend>
            
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" name="firstName" required><br><br>
            
            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" name="lastName" required><br><br>
            
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" required><br><br>
            
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required><br><br>
            
            <label>Gender:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label><br><br>
            
            <label for="profilePic">Profile Picture:</label>
            <input type="file" id="profilePic" name="profilePic" accept="image/*"><br><br>
        </fieldset>

         <fieldset>

            <legend>Parent's Information</legend>
            
            <label for="Parent's Name">Parent's/Guardian Name:</label>
            <input type="text" id="parentName" name="parentName" required><br><br>
            
            <label for="Number">Contact Number:</label>
            <input type="number" id="Number" name="Number" required><br><br>
            
            <label for="email">Parent's Email Address:</label>
            <input type="email" id="email" name="email" required><br><br>
            
            <label for="age">Parent's Occupation:</label>
            <input type="text" id="occupation" name="occupation" required><br><br>
            
            <label>Who to pick the child:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Father</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Mother</label><br><br>
            
        </fieldset>
        <fieldset>

            <legend>MEDICAL INFORMATION</legend>
            
            <label for="allergies">Allergies:</label>
            <input type="text" id="allergies" name="allergies">
            <br><br>
            
            <label>Chronic Disease:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Yes</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">No</label><br><br>

    </form>
</body>
</html>
